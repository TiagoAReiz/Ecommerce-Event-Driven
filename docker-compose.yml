# ==============================================================================
# REDE — todos os serviços conversam entre si por aqui (via nome do container)
# ==============================================================================
networks:
  ecommerce-network:
    driver: bridge

# ==============================================================================
# VOLUMES — um volume nomeado por banco (+ kafka), pra dados persistirem entre restarts
# ==============================================================================
volumes:
  kafka_data:
  auth_db_data:
  cart_db_data:
  catalog_db_data:
  inventory_db_data:
  notification_db_data:
  order_db_data:
  payment_db_data:
  review_db_data:
  shipping_db_data:
