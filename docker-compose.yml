name: ecommerce-event-driven

# ============================================================================
# CONFIG COMPARTILHADA
# Anchor reaproveitada em todo container de Postgres, pra não repetir
# image/restart/healthcheck em cada bloco de serviço lá embaixo.
# ============================================================================
x-postgres-base: &postgres-base
  image: postgres:16-alpine
  restart: unless-stopped
  networks:
    - ecommerce-network

x-app-base: &app-base
  restart: unless-stopped
  networks:
    - ecommerce-network

services:
  # ==========================================================================
  # KAFKA — broker de eventos, usado por todos os microservices
  # apache/kafka: imagem oficial da Apache, modo KRaft (sem Zookeeper)
  # ==========================================================================
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:${KAFKA_HOST_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "${KAFKA_HOST_PORT}:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - ecommerce-network

  # ==========================================================================
  # AUTH — auth-db + auth-service
  # ==========================================================================
  auth-db:
    <<: *postgres-base
    container_name: auth-db
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    <<: *app-base
    container_name: auth-service
    build:
      context: ./Micro-services/auth
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${AUTH_DB_USER}:${AUTH_DB_PASSWORD}@auth-db:5432/${AUTH_DB_NAME}
      KAFKA_BROKER: kafka:9092
      KAFKA_CLIENT_ID: auth-service
      KAFKA_CONSUMER_GROUP_ID: auth-service-group
    ports:
      - "${AUTH_APP_PORT}:3000"
    depends_on:
      auth-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ==========================================================================
  # CART — cart-db + cart-service
  # ==========================================================================
  cart-db:
    <<: *postgres-base
    container_name: cart-db
    environment:
      POSTGRES_USER: ${CART_DB_USER}
      POSTGRES_PASSWORD: ${CART_DB_PASSWORD}
